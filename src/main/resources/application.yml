server:
  port: 8091

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres?currentSchema=test,public
    username: postgres
    password: stock1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: test
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # OpenAI API Key (환경변수에서 로드 권장)
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:none}

# ==================== 애플리케이션 커스텀 설정 ====================
app:
  llm:
    provider: SF-TEST   # LOCAL-OLLAMA | LOCAL-LLAMA | OPENAI | SF-TEST
    ollama:
      base-url: http://localhost:11434
      model: qwen2.5-14b-instruct:latest
    llama:
      base-url: http://localhost:8091  # llama-server 기본 포트
    sf:
      token: ${SF_TOKEN:sk-xhettimyfiwloviwafyyckdbkgriugurbyvtjckrgpndyqrh}
      model: Qwen/Qwen2.5-7B-Instruct
  embedding:
    model-path: models/multilingual-e5-base/model.onnx
    tokenizer-path: models/multilingual-e5-base/tokenizer.json
    dimension: 768
    max-token-length: 512
  rag:
    top-k: 5
    similarity-threshold: 0.5
  chunk:
    max-chars: 800
    overlap-chars: 100
