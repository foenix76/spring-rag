<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채용 에세이 RAG 검색</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .header { background: #007bff; color: white; padding: 1rem; text-align: center; font-size: 1.25rem; font-weight: bold; }
        .chat-box { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
        .message { max-width: 80%; padding: 0.75rem 1rem; border-radius: 1rem; line-height: 1.5; font-size: 0.95rem; }
        .message.user { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 0.25rem; }
        .message.bot { align-self: flex-start; background: white; border-bottom-left-radius: 0.25rem; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .sources { font-size: 0.8rem; color: #666; margin-top: 0.5rem; border-top: 1px solid #eee; padding-top: 0.5rem; }
        .input-area { background: white; padding: 1rem; border-top: 1px solid #ddd; display: flex; gap: 0.5rem; }
        input { flex: 1; padding: 0.75rem; border: 1px solid #ddd; border-radius: 0.5rem; outline: none; }
        button { padding: 0.75rem 1.5rem; background: #007bff; color: white; border: none; border-radius: 0.5rem; cursor: pointer; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .loading { font-style: italic; color: #999; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">채용 에세이 RAG 검색 시스템</div>
    
    <div class="chat-box" ref="chatBox">
        <div v-for="(msg, idx) in messages" :key="idx" :class="['message', msg.type]">
            <div style="white-space: pre-wrap;">{{ msg.text }}</div>
            <div v-if="msg.sources" class="sources">
                <strong>참고:</strong>
                <span v-for="s in msg.sources"> {{ s.name }}({{ (s.similarity * 100).toFixed(1) }}%) </span>
            </div>
        </div>
        <div v-if="isLoading" class="message bot loading">답변 생성 중...</div>
    </div>

    <div class="input-area">
        <input type="text" v-model="userInput" @keyup.enter="sendMessage" placeholder="질문을 입력하세요... (예: 테슬라 언급한 지원자)" :disabled="isLoading">
        <button @click="sendMessage" :disabled="isLoading || !userInput.trim()">전송</button>
    </div>
</div>

<script>
    const { createApp, ref, reactive, nextTick } = Vue;

    createApp({
        setup() {
            // --- Data (Reactive State) ---
            const userInput = ref('테슬라 언급한 지원자 찾아줘');
            const messages = reactive([
                { type: 'bot', text: '안녕하세요! 채용 에세이 RAG 검색 시스템입니다.' }
            ]);
            const isLoading = ref(false);
            const chatBox = ref(null);

            // --- Methods ---
            const scrollToBottom = async () => {
                await nextTick();
                if (chatBox.value) {
                    chatBox.value.scrollTop = chatBox.value.scrollHeight;
                }
            };

            const sendMessage = async () => {
                const text = userInput.value.trim();
                if (!text || isLoading.value) return;

                messages.push({ type: 'user', text: text });
                userInput.value = '';
                isLoading.value = true;
                await scrollToBottom();

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text })
                    });
                    const data = await response.json();
                    messages.push({ 
                        type: 'bot', 
                        text: data.answer, 
                        sources: data.sources 
                    });
                } catch (e) {
                    messages.push({ type: 'bot', text: '오류가 발생했습니다: ' + e.message });
                } finally {
                    isLoading.value = false;
                    await scrollToBottom();
                }
            };

            return {
                userInput,
                messages,
                isLoading,
                chatBox,
                sendMessage,
                scrollToBottom
            };
        }
    }).mount('#app');
</script>

</body>
</html>
