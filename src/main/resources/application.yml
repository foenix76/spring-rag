server:
  port: 8091

spring:
  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true
  web:
    resources:
      static-locations: file:src/main/resources/static/,classpath:/static/
      cache:
        period: 0
  autoconfigure:
    exclude:
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres?currentSchema=test,public
    username: postgres
    password: stock1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: test
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Spring AI 표준 설정 (OpenAI 호환 API - SiliconFlow 전용)
  ai:
    ollama:
      chat:
        enabled: false
    openai:
      api-key: ${SF_TOKEN:sk-xhettimyfiwloviwafyyckdbkgriugurbyvtjckrgpndyqrh}
      base-url: https://api.siliconflow.com
      chat:
        options:
          model: deepseek-ai/DeepSeek-V3
    # HTTP 클라이언트 타임아웃 보강
    retry:
      initial-interval: 2s
      max-interval: 10s
      max-attempts: 3
    mcp:
      server:
        enabled: true
        name: HR-Recruitment-Hub-Agent
        version: 2.0.0
        protocol: STREAMABLE
        request-timeout: 60s
        streamable-http:
          mcp-endpoint: /mcp

# ==================== 애플리케이션 커스텀 설정 (RAG용) ====================
app:
  embedding:
    model-path: models/multilingual-e5-base/model.onnx
    tokenizer-path: models/multilingual-e5-base/tokenizer.json
    dimension: 768
    max-token-length: 512
  reranker:
    model-path: models/bge-reranker-v2-m3/model.onnx
    tokenizer-path: models/bge-reranker-v2-m3/tokenizer.json
    max-token-length: 512
  rag:
    retrieval-top-k: 20
    rerank-top-k: 5
    similarity-threshold: 0.3
  chunk:
    max-chars: 800
    overlap-chars: 100
